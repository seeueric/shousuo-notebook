<!DOCTYPE html>
<!-- iBook · iOS 风格记录本（账号云同步，导出/导入作备份） -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iBook</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="iBook">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root{
    --bg:#f2f2f7; --panel:#ffffff; --panel-2:rgba(120,120,128,.10); --ink:#1c1c1e; --muted:#8e8e93;
    --line:rgba(60,60,67,.14); --chk:#c7c7cc; --accent:#007aff; --seg-thumb:#ffffff; --accent-ink:#fff; --accent-soft:rgba(0,122,255,.12);
    --green:#34c759; --green-soft:rgba(52,199,89,.15); --red:#ff3b30; --orange:#ff9500;
    --shadow:0 1px 2px rgba(0,0,0,.03),0 5px 18px rgba(0,0,0,.05);
    --radius:16px;
    --card-yellow-bg:#fff4cc; --card-green-bg:#e5f8ea; --card-blue-bg:#e3f0ff; --card-pink-bg:#ffe9f0;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#000000; --panel:#1c1c1e; --panel-2:rgba(120,120,128,.18); --ink:#ffffff; --muted:#98989f;
      --line:rgba(84,84,88,.48); --chk:#48484a; --accent:#0a84ff; --seg-thumb:#636366; --accent-ink:#fff; --accent-soft:rgba(10,132,255,.20);
      --green:#30d158; --green-soft:rgba(48,209,88,.20); --red:#ff453a; --orange:#ff9f0a;
      --shadow:0 0 0 0 rgba(0,0,0,0);
      --card-yellow-bg:#3a3423; --card-green-bg:#20351f; --card-blue-bg:#1c2f43; --card-pink-bg:#3a2530;
    }
  }
  :root[data-theme="dark"]{
    --bg:#000000; --panel:#1c1c1e; --panel-2:rgba(120,120,128,.18); --ink:#ffffff; --muted:#98989f;
    --line:rgba(84,84,88,.48); --chk:#48484a; --accent:#0a84ff; --seg-thumb:#636366; --accent-ink:#fff; --accent-soft:rgba(10,132,255,.20);
    --green:#30d158; --green-soft:rgba(48,209,88,.20); --red:#ff453a; --orange:#ff9f0a;
    --shadow:0 0 0 0 rgba(0,0,0,0);
    --card-yellow-bg:#3a3423; --card-green-bg:#20351f; --card-blue-bg:#1c2f43; --card-pink-bg:#3a2530;
  }
  :root[data-theme="light"]{
    --bg:#f2f2f7; --panel:#ffffff; --panel-2:rgba(120,120,128,.10); --ink:#1c1c1e; --muted:#8e8e93;
    --line:rgba(60,60,67,.14); --chk:#c7c7cc; --accent:#007aff; --seg-thumb:#ffffff; --accent-ink:#fff; --accent-soft:rgba(0,122,255,.12);
    --green:#34c759; --green-soft:rgba(52,199,89,.15); --red:#ff3b30; --orange:#ff9500;
    --shadow:0 1px 2px rgba(0,0,0,.03),0 5px 18px rgba(0,0,0,.05);
    --card-yellow-bg:#fff4cc; --card-green-bg:#e5f8ea; --card-blue-bg:#e3f0ff; --card-pink-bg:#ffe9f0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  [hidden]{display:none !important}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input,textarea,select{font:inherit;color:var(--ink)}
  ::placeholder{color:var(--muted);opacity:.8}

  /* ===== 布局 ===== */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:216px;flex-shrink:0;padding:24px 14px;border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;
  }
  .logo{font-size:19px;font-weight:700;letter-spacing:-.2px;padding:2px 12px 20px}
  .logo span{color:var(--accent)}
  .nav-btn{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
    font-weight:500;color:var(--muted);text-align:left;transition:background .15s,color .15s;
  }
  .nav-btn:hover{background:var(--panel-2);color:var(--ink)}
  .nav-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .ico{display:inline-flex;align-items:center;justify-content:center}
  .ico svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .sidebar-foot{margin-top:auto;display:flex;flex-direction:column;gap:2px;padding-top:14px;border-top:1px solid var(--line)}
  .foot-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;color:var(--muted);font-size:13px;text-align:left}
  .foot-btn:hover{background:var(--panel-2);color:var(--ink)}
  .foot-btn .ico svg{width:17px;height:17px}

  .main{flex:1;min-width:0;padding:32px 36px 60px;max-width:1180px}
  .view{display:none}
  .view.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .view-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .view-title{font-size:27px;font-weight:700;letter-spacing:-.5px}
  .view-sub{color:var(--muted);font-size:13px;margin-top:3px}

  /* ===== 通用组件 ===== */
  .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 15px;border-radius:10px;
    background:var(--panel-2);font-weight:600;font-size:13.5px;color:var(--ink);
    transition:transform .1s,filter .15s;white-space:nowrap;
  }
  .btn:hover{filter:brightness(.96)}
  .btn:active{transform:scale(.96)}
  .btn.primary{background:var(--accent);color:var(--accent-ink)}
  .btn.small{padding:5px 11px;font-size:12.5px}
  .icon-btn{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
  .icon-btn:hover{background:var(--panel-2);color:var(--ink)}
  .del-btn{color:var(--muted);opacity:0;transition:opacity .12s;font-size:13px;padding:2px 6px;border-radius:6px;flex-shrink:0}
  .del-btn:hover{color:var(--red);background:var(--panel-2)}
  li:hover .del-btn,.plan-item:hover .del-btn,.kcard:hover .del-btn,.habit-chip:hover .del-btn,.ms-row:hover .del-btn{opacity:1}
  .empty{color:var(--muted);text-align:center;padding:26px 10px;font-size:13.5px}
  .add-row{display:flex;gap:8px}
  .add-row input[type=text]{
    flex:1;padding:9px 13px;border:none;border-radius:10px;background:var(--panel-2);outline:none;
    transition:box-shadow .15s;
  }
  .add-row input[type=text]:focus{box-shadow:0 0 0 3px var(--accent-soft)}

  /* ===== 每日待办 ===== */
  .day-nav{display:flex;align-items:center;gap:8px}
  .day-nav input[type=date]{padding:7px 10px;border:none;border-radius:10px;background:var(--panel-2);outline:none;color:var(--ink)}
  .daily-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start}
  .panel-h{display:flex;align-items:baseline;justify-content:space-between;padding:17px 18px 0}
  .panel-h h3{font-size:16px;font-weight:600;letter-spacing:-.2px}
  .panel-h .hint{color:var(--muted);font-size:12px}
  .panel-body{padding:14px 18px 18px}
  .prog-wrap{height:5px;background:var(--panel-2);border-radius:99px;overflow:hidden;margin:13px 18px 0}
  .prog-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .3s ease}
  ul.task-list{list-style:none;display:flex;flex-direction:column;gap:1px;margin-bottom:12px}
  ul.task-list li{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:10px}
  ul.task-list li:hover{background:var(--panel-2)}
  .chk{
    width:22px;height:22px;border:1.5px solid var(--chk);border-radius:50%;flex-shrink:0;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s;
  }
  li.done .chk{background:var(--accent);border-color:var(--accent);color:#fff}
  .task-text{flex:1;word-break:break-word}
  li.done .task-text{color:var(--muted);text-decoration:line-through}
  .habit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .habit-chip{
    display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:12px;
    background:var(--panel-2);transition:background .15s;
  }
  .habit-chip.on{background:var(--green-soft)}
  .habit-chip.on .chk{background:var(--green);border-color:var(--green);color:#fff}
  .habit-name{flex:1;font-weight:500}
  .streak{font-size:12px;color:var(--muted);white-space:nowrap}
  .streak.hot{color:var(--orange);font-weight:600}

  /* ===== 周计划 ===== */
  .week-scroll{overflow-x:auto;padding-bottom:6px}
  .week-grid{display:grid;grid-template-columns:repeat(7,minmax(148px,1fr));gap:12px;min-width:1050px}
  .day-col{background:var(--panel);border-radius:var(--radius);
    display:flex;flex-direction:column;min-height:340px;box-shadow:var(--shadow)}
  .day-col.today{box-shadow:0 0 0 1.5px var(--accent),var(--shadow)}
  .day-col-h{padding:12px 13px 10px;border-bottom:1px solid var(--line);cursor:pointer}
  .day-col-h:hover .dow{color:var(--accent)}
  .dow{font-weight:600;font-size:13.5px}
  .day-col.today .dow{color:var(--accent)}
  .dnum{color:var(--muted);font-size:11.5px;margin-top:1px}
  .day-col-body{padding:9px;flex:1;display:flex;flex-direction:column;gap:6px}
  .plan-item{
    display:flex;align-items:baseline;gap:6px;padding:7px 9px;border-radius:9px;
    background:var(--panel-2);font-size:13px;word-break:break-word;
  }
  .plan-time{color:var(--accent);font-weight:600;font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .plan-text{flex:1}
  .add-plan{margin-top:auto;color:var(--accent);font-weight:600;font-size:12.5px;padding:7px;border-radius:9px;text-align:center}
  .add-plan:hover{background:var(--accent-soft)}

  /* ===== 目标追踪 ===== */
  .goal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .goal-card{padding:18px 20px}
  .goal-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
  .goal-name{font-size:16.5px;font-weight:600;letter-spacing:-.2px;flex:1;word-break:break-word}
  .goal-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .chip{font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px;background:var(--panel-2);color:var(--muted)}
  .chip.warn{background:rgba(255,59,48,.12);color:var(--red)}
  .chip.ok{background:var(--green-soft);color:var(--green)}
  .goal-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .goal-prog{flex:1;height:6px;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .goal-prog .prog-bar{background:var(--accent)}
  .goal-prog .prog-bar.full{background:var(--green)}
  .goal-pct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
  .goal-note{font-size:13px;color:var(--muted);margin-bottom:10px;white-space:pre-wrap;word-break:break-word}
  .ms-list{list-style:none;display:flex;flex-direction:column;gap:1px;margin-bottom:10px}
  .ms-row{display:flex;align-items:center;gap:10px;padding:6px;border-radius:9px;font-size:13.5px}
  .ms-row:hover{background:var(--panel-2)}
  .ms-row .chk{width:19px;height:19px;font-size:10px}
  .ms-row.done .chk{background:var(--accent);border-color:var(--accent);color:#fff}
  .ms-row.done .ms-text{color:var(--muted);text-decoration:line-through}
  .ms-text{flex:1;word-break:break-word}
  .add-row.mini input[type=text]{padding:7px 11px;font-size:13px}

  /* ===== 笔记板 ===== */
  .board-scroll{overflow-x:auto;padding-bottom:10px}
  .board{display:flex;gap:14px;align-items:flex-start;min-height:420px}
  .kcol{width:272px;flex-shrink:0;background:var(--panel);border-radius:var(--radius);padding:11px;box-shadow:var(--shadow)}
  .kcol.drag-over{box-shadow:0 0 0 2px var(--accent),var(--shadow)}
  .kcol-h{display:flex;align-items:center;gap:6px;padding:4px 6px 10px}
  .kcol-name{font-weight:600;flex:1;cursor:pointer;word-break:break-word;letter-spacing:-.2px}
  .kcol-name:hover{color:var(--accent)}
  .kcount{font-size:12px;color:var(--muted);background:var(--panel-2);border-radius:99px;padding:1px 8px}
  .kcards{display:flex;flex-direction:column;gap:7px;min-height:30px}
  .kcard{
    background:var(--panel-2);border-radius:12px;padding:10px 12px;
    font-size:13.5px;white-space:pre-wrap;word-break:break-word;cursor:grab;
    display:flex;gap:6px;align-items:flex-start;
  }
  .kcard:active{cursor:grabbing}
  .kcard.dragging{opacity:.45}
  .kcard .ktext{flex:1;cursor:pointer}
  .kcard.c-yellow{background:var(--card-yellow-bg)}
  .kcard.c-green{background:var(--card-green-bg)}
  .kcard.c-blue{background:var(--card-blue-bg)}
  .kcard.c-pink{background:var(--card-pink-bg)}
  .add-card{margin-top:8px;width:100%;color:var(--accent);font-weight:600;font-size:13px;padding:8px;border-radius:10px;text-align:center}
  .add-card:hover{background:var(--accent-soft)}
  .add-col{
    width:200px;flex-shrink:0;background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);
    color:var(--accent);font-weight:600;padding:16px;text-align:center;font-size:13.5px;
  }
  .add-col:hover{filter:brightness(.98)}

  /* ===== 账号 / 弹窗提示 ===== */
  .sync-p{font-size:13.5px;margin-bottom:12px}
  .sync-actions{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .sync-actions .btn{justify-content:center;padding:11px}
  .sync-note{font-size:12.5px;color:var(--muted);background:var(--panel-2);border-radius:10px;padding:10px 12px}
  .sync-kv{font-size:13.5px;display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .sync-kv b{font-weight:600}
  .acct-err{color:var(--red);font-size:12.5px;min-height:1.2em;margin-bottom:10px}
  .linklike{color:var(--muted);font-size:12.5px;text-decoration:underline;padding:6px;text-align:center}
  .linklike:hover{color:var(--accent)}
  .code-input{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;text-align:center;letter-spacing:1.5px;font-weight:700}

  /* ===== 弹窗 ===== */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:20px;width:100%;max-width:420px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
  .modal h3{font-size:17px;font-weight:600;letter-spacing:-.3px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field textarea,.field select{
    width:100%;padding:10px 12px;border:none;border-radius:10px;background:var(--panel-2);outline:none;
    transition:box-shadow .15s;
  }
  .field input:focus,.field textarea:focus{box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:84px}
  .swatches{display:flex;gap:8px}
  .swatch{width:30px;height:30px;border-radius:9px;border:2px solid transparent;transition:transform .1s}
  .swatch.sel{border-color:var(--accent);transform:scale(1.12)}
  .sw-default{background:var(--panel-2)} .sw-yellow{background:#f5df8e} .sw-green{background:#a9d3a4}
  .sw-blue{background:#a3c6e4} .sw-pink{background:#eebbcd}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .danger-link{margin-right:auto;color:var(--red);font-size:13px;padding:7px 4px}
  .danger-link:hover{text-decoration:underline}

  /* ===== 计划：分段控制器 / 日程 / 日历 ===== */
  .seg{display:inline-flex;background:var(--panel-2);border-radius:9px;padding:2px;gap:2px;margin-bottom:18px}
  .seg-btn{padding:6px 22px;border-radius:7px;font-size:13.5px;font-weight:500;color:var(--ink);transition:background .15s}
  .seg-btn.active{background:var(--seg-thumb);box-shadow:0 1px 3px rgba(0,0,0,.14);font-weight:600}
  .plan-day{padding:8px 10px;max-width:620px}
  .plan-day-list{list-style:none;display:flex;flex-direction:column}
  .plan-day-item{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:10px}
  .plan-day-item+.plan-day-item{border-top:1px solid var(--line)}
  .plan-day-item:hover{background:var(--panel-2)}
  .pd-time{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;min-width:44px}
  .pd-text{flex:1;word-break:break-word}
  .add-plan-row{width:100%;color:var(--accent);font-weight:600;font-size:14px;padding:12px;border-radius:10px;text-align:center}
  .add-plan-row:hover{background:var(--accent-soft)}
  .cal-wrap{max-width:480px;margin-bottom:18px;background:var(--panel);border-radius:16px;box-shadow:var(--shadow);padding:14px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding-bottom:2px}
  .cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:14px;color:var(--ink);background:transparent}
  .cal-cell.other{opacity:.32}
  .cal-cell.today{color:var(--accent);font-weight:700}
  .cal-cell.sel{background:var(--accent);color:#fff;font-weight:700}
  .cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .cal-cell.sel .cal-dot{background:#fff}

  /* ===== 底部标签栏（移动端） ===== */
  .tabbar{display:none}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 5px;color:var(--muted);font-size:10.5px;font-weight:500}
  .tab-btn .ico svg{width:25px;height:25px;stroke-width:1.7}
  .tab-btn.active{color:var(--accent)}
  .tab-btn.active .ico svg{stroke-width:2.1}

  /* ===== 设置页（iOS 分组列表） ===== */
  .settings-group{background:var(--panel);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;max-width:540px}
  .set-row{display:flex;align-items:center;gap:13px;padding:13px 15px;width:100%;text-align:left}
  .set-row+.set-row{border-top:1px solid var(--line)}
  .set-row:active{background:var(--panel-2)}
  .set-ico{width:29px;height:29px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
  .set-ico svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .set-ico.blue{background:var(--accent)} .set-ico.gray{background:#8e8e93} .set-ico.green{background:var(--green)} .set-ico.orange{background:var(--orange)}
  .set-main{flex:1;min-width:0}
  .set-title{font-size:15px;font-weight:500;display:block}
  .set-sub{font-size:12px;color:var(--muted);margin-top:1px;display:block}
  .set-arrow{color:var(--chk);flex-shrink:0;display:flex}
  .set-arrow svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .sheet-grab{display:none}

  /* ===== 响应式：手机端切换为 iOS 式底部标签栏 + 底部面板 ===== */
  @media (max-width:820px){
    .app{flex-direction:column}
    .sidebar{display:none}
    .main{padding:max(env(safe-area-inset-top),16px) 16px calc(74px + env(safe-area-inset-bottom));max-width:none}
    .daily-grid{grid-template-columns:1fr}
    .view-title{font-size:25px}
    .view-head{margin-bottom:18px}

    /* 计划周视图 & 笔记板：手机端改为竖向一行行，禁止横向滚动 */
    .week-scroll{overflow-x:visible}
    .week-grid{display:flex;flex-direction:column;gap:12px;min-width:0}
    .day-col{min-height:auto}
    .board-scroll{overflow-x:visible}
    .board{flex-direction:column;min-height:0;align-items:stretch}
    .kcol{width:auto}
    .add-col{width:auto}
    .seg{display:flex;width:100%}
    .seg-btn{flex:1;text-align:center;padding:8px 0}
    .cal-wrap{max-width:none}
    .plan-day{max-width:none}

    .tabbar{
      display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;
      background:color-mix(in srgb,var(--panel) 80%,transparent);
      backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
      border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);
    }

    /* 弹窗 → 从底部滑出的操作面板 */
    .overlay{align-items:flex-end;padding:0}
    .modal{
      max-width:none;border-radius:22px 22px 0 0;padding:6px 20px calc(22px + env(safe-area-inset-bottom));
      animation:sheetUp .3s cubic-bezier(.32,.72,0,1);will-change:transform;
    }
    .sheet-grab{display:block;width:38px;height:5px;border-radius:99px;background:var(--chk);margin:5px auto 12px}
    .modal h3{text-align:center}
  }
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){.modal{animation:none}}
</style>

<script>
'use strict';
/* ================= 数据 ================= */
const LS_KEY = 'shousuo-notebook-v1';
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

function defaultData() {
  return {
    tasks: {},            // { 'YYYY-MM-DD': [{id,text,done}] }
    habits: [],           // [{id,name,checks:{'YYYY-MM-DD':true}}]
    plans: {},            // { 'YYYY-MM-DD': [{id,time,text}] }
    goals: [],            // [{id,name,deadline,note,milestones:[{id,text,done}]}]
    board: { columns: [
      { id: uid(), name: '💡 想法', cards: [] },
      { id: uid(), name: '📋 任务', cards: [] },
      { id: uid(), name: '📝 备注', cards: [] },
    ]},
    theme: 'auto',
  };
}
let data;
try {
  data = JSON.parse(localStorage.getItem(LS_KEY)) || defaultData();
  if (!data.board || !Array.isArray(data.board.columns)) data = defaultData();
} catch (e) { data = defaultData(); }
data.tasks = data.tasks || {}; data.habits = data.habits || [];
data.plans = data.plans || {}; data.goals = data.goals || [];
data.updatedAt = data.updatedAt || 0;

const persistLocal = () => { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {} };
const save = () => { data.updatedAt = Date.now(); persistLocal(); scheduleCloudPush(); };

/* ================= 日期工具 ================= */
const pad = n => String(n).padStart(2, '0');
const fmt = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const parse = s => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
const addDays = (s, n) => { const d = parse(s); d.setDate(d.getDate() + n); return fmt(d); };
const todayStr = () => fmt(new Date());
const WEEKS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
const cnDate = s => { const d = parse(s); return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 ${WEEKS[d.getDay()]}`; };
const mondayOf = s => { const d = parse(s); const off = (d.getDay() + 6) % 7; d.setDate(d.getDate() - off); return fmt(d); };

/* ================= 状态 ================= */
const state = { view: 'daily', date: todayStr(), planDate: todayStr(), planMode: 'week' };
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

/* ================= 渲染：导航 ================= */
function renderNav() {
  document.querySelectorAll('.nav-btn, .tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.view === state.view));
  document.querySelectorAll('.view').forEach(v =>
    v.classList.toggle('active', v.id === 'view-' + state.view));
}

/* ================= 渲染：每日待办 ================= */
function habitStreak(h) {
  let streak = 0, cur = todayStr();
  if (!h.checks[cur]) cur = addDays(cur, -1);       // 今天没打不清零，从昨天算
  while (h.checks[cur]) { streak++; cur = addDays(cur, -1); }
  return streak;
}
function renderDaily() {
  const dstr = state.date;
  $('#daily-title').textContent = cnDate(dstr);
  $('#daily-sub').textContent = dstr === todayStr() ? '今天 · 把重要的事一件件划掉' :
    (dstr < todayStr() ? '过去的一天' : '未来的一天');
  $('#day-picker').value = dstr;

  const tasks = data.tasks[dstr] || [];
  const done = tasks.filter(t => t.done).length;
  $('#task-stat').textContent = tasks.length ? `完成 ${done} / ${tasks.length}` : '';
  $('#task-prog').style.width = tasks.length ? (done / tasks.length * 100) + '%' : '0%';
  $('#task-list').innerHTML = tasks.length ? tasks.map(t => `
    <li class="${t.done ? 'done' : ''}">
      <button class="chk" data-action="toggle-task" data-id="${t.id}">✓</button>
      <span class="task-text">${esc(t.text)}</span>
      <button class="del-btn" data-action="del-task" data-id="${t.id}" title="删除">✕</button>
    </li>`).join('') : '<div class="empty">这一天还没有待办，添加一条吧 ☕️</div>';

  $('#habit-list').innerHTML = data.habits.length ? data.habits.map(h => {
    const on = !!h.checks[dstr];
    const st = habitStreak(h);
    return `
    <div class="habit-chip ${on ? 'on' : ''}">
      <button class="chk" data-action="toggle-habit" data-id="${h.id}">✓</button>
      <span class="habit-name">${esc(h.name)}</span>
      <span class="streak ${st >= 3 ? 'hot' : ''}">${st > 0 ? '🔥 连续 ' + st + ' 天' : '未开始'}</span>
      <button class="del-btn" data-action="del-habit" data-id="${h.id}" title="删除习惯">✕</button>
    </div>`;
  }).join('') : '<div class="empty">还没有习惯，先立一个小目标 🌱</div>';
}

/* ================= 渲染：周计划 ================= */
function renderPlan() {
  document.querySelectorAll('#plan-seg .seg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === state.planMode));
  if (state.planMode === 'day') renderPlanDay();
  else if (state.planMode === 'month') renderPlanMonth();
  else renderPlanWeek();
}
function shiftPlan(dir) {
  if (state.planMode === 'day') state.planDate = addDays(state.planDate, dir);
  else if (state.planMode === 'week') state.planDate = addDays(state.planDate, dir * 7);
  else { const d = parse(state.planDate); d.setDate(1); d.setMonth(d.getMonth() + dir); state.planDate = fmt(d); }
  renderPlan();
}
function planDayList(dstr) {
  const items = (data.plans[dstr] || []).slice()
    .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
  return `<div class="card plan-day">
    ${items.length ? `<ul class="plan-day-list">${items.map(p => `
      <li class="plan-day-item">
        <span class="pd-time">${p.time ? esc(p.time) : '全天'}</span>
        <span class="pd-text">${esc(p.text)}</span>
        <button class="del-btn" data-action="del-plan" data-date="${dstr}" data-id="${p.id}">✕</button>
      </li>`).join('')}</ul>` : '<div class="empty">这一天还没有安排 ☕️</div>'}
    <button class="add-plan-row" data-action="add-plan" data-date="${dstr}">＋ 添加安排</button>
  </div>`;
}
function renderPlanDay() {
  const dstr = state.planDate;
  $('#plan-range').textContent = cnDate(dstr) + (dstr === todayStr() ? ' · 今天' : '');
  $('#plan-body').innerHTML = planDayList(dstr);
}
function renderPlanWeek() {
  const mon = mondayOf(state.planDate);
  const sun = addDays(mon, 6);
  const m = parse(mon), s2 = parse(sun);
  $('#plan-range').textContent =
    `${m.getFullYear()}年${m.getMonth() + 1}月${m.getDate()}日 — ${s2.getMonth() + 1}月${s2.getDate()}日`;
  let html = '<div class="week-scroll"><div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const dstr = addDays(mon, i);
    const d = parse(dstr);
    const items = (data.plans[dstr] || []).slice()
      .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
    html += `
    <div class="day-col ${dstr === todayStr() ? 'today' : ''}">
      <div class="day-col-h" data-action="goto-day" data-date="${dstr}" title="查看这天的待办">
        <div class="dow">${WEEKS[d.getDay()]}</div>
        <div class="dnum">${d.getMonth() + 1}月${d.getDate()}日${dstr === todayStr() ? ' · 今天' : ''}</div>
      </div>
      <div class="day-col-body">
        ${items.map(p => `
          <div class="plan-item">
            ${p.time ? `<span class="plan-time">${esc(p.time)}</span>` : ''}
            <span class="plan-text">${esc(p.text)}</span>
            <button class="del-btn" data-action="del-plan" data-date="${dstr}" data-id="${p.id}">✕</button>
          </div>`).join('')}
        <button class="add-plan" data-action="add-plan" data-date="${dstr}">＋ 安排</button>
      </div>
    </div>`;
  }
  html += '</div></div>';
  $('#plan-body').innerHTML = html;
}
function renderPlanMonth() {
  const d = parse(state.planDate);
  const year = d.getFullYear(), month = d.getMonth();
  $('#plan-range').textContent = `${year}年${month + 1}月`;
  const startOff = (new Date(year, month, 1).getDay() + 6) % 7;   // 周一为一周起点
  const gridStart = new Date(year, month, 1 - startOff);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const weeks = Math.ceil((startOff + daysInMonth) / 7);
  let cells = ['一', '二', '三', '四', '五', '六', '日'].map(w => `<div class="cal-dow">${w}</div>`).join('');
  for (let i = 0; i < weeks * 7; i++) {
    const cur = new Date(gridStart); cur.setDate(gridStart.getDate() + i);
    const cstr = fmt(cur);
    const cls = ['cal-cell'];
    if (cur.getMonth() !== month) cls.push('other');
    if (cstr === todayStr()) cls.push('today');
    if (cstr === state.planDate) cls.push('sel');
    const has = (data.plans[cstr] || []).length;
    cells += `<button class="${cls.join(' ')}" data-action="plan-pick" data-date="${cstr}">
      <span>${cur.getDate()}</span>${has ? '<span class="cal-dot"></span>' : ''}</button>`;
  }
  $('#plan-body').innerHTML = `<div class="cal-wrap"><div class="cal">${cells}</div></div>` + planDayList(state.planDate);
}

/* ================= 渲染：目标追踪 ================= */
function renderGoals() {
  const g = $('#goal-grid');
  if (!data.goals.length) {
    g.innerHTML = '<div class="empty" style="grid-column:1/-1;padding:60px 0">还没有目标。点右上角「＋ 新目标」，把大事拆成里程碑 🎯</div>';
    return;
  }
  g.innerHTML = data.goals.map(goal => {
    const total = goal.milestones.length;
    const done = goal.milestones.filter(m => m.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    let ddlChip = '';
    if (goal.deadline) {
      const days = Math.ceil((parse(goal.deadline) - parse(todayStr())) / 864e5);
      ddlChip = pct >= 100 ? `<span class="chip ok">已完成 🎉</span>` :
        days < 0 ? `<span class="chip warn">已逾期 ${-days} 天</span>` :
        days === 0 ? `<span class="chip warn">今天截止</span>` :
        `<span class="chip">剩 ${days} 天 · ${goal.deadline}</span>`;
    } else if (pct >= 100) ddlChip = `<span class="chip ok">已完成 🎉</span>`;
    return `
    <div class="card goal-card">
      <div class="goal-top">
        <div class="goal-name">${esc(goal.name)}</div>
        <button class="icon-btn" data-action="edit-goal" data-id="${goal.id}" title="编辑">✏️</button>
      </div>
      <div class="goal-meta">${ddlChip}<span class="chip">里程碑 ${done}/${total}</span></div>
      <div class="goal-prog-row">
        <div class="goal-prog"><div class="prog-bar ${pct >= 100 ? 'full' : ''}" style="width:${pct}%"></div></div>
        <span class="goal-pct">${pct}%</span>
      </div>
      ${goal.note ? `<div class="goal-note">${esc(goal.note)}</div>` : ''}
      <ul class="ms-list">
        ${goal.milestones.map(m => `
          <li class="ms-row ${m.done ? 'done' : ''}">
            <button class="chk" data-action="toggle-ms" data-goal="${goal.id}" data-id="${m.id}">✓</button>
            <span class="ms-text">${esc(m.text)}</span>
            <button class="del-btn" data-action="del-ms" data-goal="${goal.id}" data-id="${m.id}">✕</button>
          </li>`).join('')}
      </ul>
      <div class="add-row mini">
        <input type="text" placeholder="添加里程碑…" data-enter="add-ms" data-goal="${goal.id}">
        <button class="btn small" data-action="add-ms" data-goal="${goal.id}">＋</button>
      </div>
    </div>`;
  }).join('');
}

/* ================= 渲染：笔记板 ================= */

/* ================= 弹窗 ================= */
let modalSubmit = null;
function openModal({ title, fields = [], html = '', onSubmit, danger, hideOk }) {
  $('#modal-title').textContent = title;
  $('#modal-body').innerHTML = html || fields.map(f => {
    if (f.type === 'textarea')
      return `<div class="field"><label>${f.label}</label><textarea data-key="${f.key}" placeholder="${f.placeholder || ''}">${esc(f.value || '')}</textarea></div>`;
    if (f.type === 'swatches')
      return `<div class="field"><label>${f.label}</label>
        <div class="swatches" data-key="${f.key}" data-value="${f.value || 'default'}">
          ${['default', 'yellow', 'green', 'blue', 'pink'].map(c =>
            `<button type="button" class="swatch sw-${c} ${(f.value || 'default') === c ? 'sel' : ''}" data-swatch="${c}"></button>`).join('')}
        </div></div>`;
    return `<div class="field"><label>${f.label}</label>
      <input type="${f.type || 'text'}" data-key="${f.key}" value="${esc(f.value || '')}" placeholder="${f.placeholder || ''}"></div>`;
  }).join('');
  const dbtn = $('#modal-danger');
  if (danger) { dbtn.hidden = false; dbtn.textContent = danger.label; dbtn.onclick = () => { closeModal(); danger.onClick(); }; }
  else dbtn.hidden = true;
  $('#modal-ok').hidden = !!hideOk;
  modalSubmit = hideOk ? null : () => {
    const vals = {};
    $('#modal-body').querySelectorAll('[data-key]').forEach(el => {
      vals[el.dataset.key] = el.dataset.swatch !== undefined ? el.dataset.value :
        (el.classList.contains('swatches') ? el.dataset.value : el.value.trim());
    });
    closeModal(); onSubmit(vals);
  };
  $('#overlay').classList.add('show');
  const first = $('#modal-body').querySelector('input,textarea');
  if (first) setTimeout(() => first.focus(), 40);
}
function closeModal() { $('#overlay').classList.remove('show'); modalSubmit = null; }
$('#modal-ok').addEventListener('click', () => modalSubmit && modalSubmit());
$('#overlay').addEventListener('click', e => { if (e.target === $('#overlay')) closeModal(); });
$('#modal-body').addEventListener('click', e => {
  const sw = e.target.closest('.swatch');
  if (!sw) return;
  const wrap = sw.parentElement;
  wrap.dataset.value = sw.dataset.swatch;
  wrap.querySelectorAll('.swatch').forEach(s => s.classList.toggle('sel', s === sw));
});
/* 移动端：在面板顶部向下拖动可关闭 */
(function () {
  const overlay = $('#overlay');
  let startY = null, dy = 0, panel = null;
  overlay.addEventListener('touchstart', e => {
    if (window.innerWidth > 820) return;
    if (e.target.closest('input,textarea,select,button,.swatches')) return;
    panel = overlay.querySelector('.modal'); if (!panel) return;
    startY = e.touches[0].clientY; dy = 0; panel.style.transition = 'none';
  }, { passive: true });
  overlay.addEventListener('touchmove', e => {
    if (startY === null || !panel) return;
    dy = e.touches[0].clientY - startY;
    if (dy > 0) panel.style.transform = 'translateY(' + dy + 'px)';
  }, { passive: true });
  overlay.addEventListener('touchend', () => {
    if (startY === null || !panel) return;
    panel.style.transition = '';
    if (dy > 90) closeModal();
    panel.style.transform = '';
    startY = null; panel = null; dy = 0;
  });
})();
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && modalSubmit && e.target.tagName !== 'TEXTAREA' && $('#overlay').classList.contains('show')) {
    e.preventDefault(); modalSubmit();
  }
});

  if (!text) return;
  (data.tasks[state.date] = data.tasks[state.date] || []).push({ id: uid(), text, done: false });
  inp.value = ''; save(); renderDaily(); inp.focus();
}
function addHabit() {
  const inp = $('#habit-input'); const name = inp.value.trim();
  if (!name) return;
  data.habits.push({ id: uid(), name, checks: {} });
  inp.value = ''; save(); renderDaily(); inp.focus();
}
function addMilestone(goalId, inp) {
  const text = inp.value.trim(); if (!text) return;
  const goal = data.goals.find(g => g.id === goalId); if (!goal) return;
  goal.milestones.push({ id: uid(), text, done: false });
  save(); renderGoals();
  const again = document.querySelector(`input[data-enter="add-ms"][data-goal="${goalId}"]`);
  if (again) again.focus();
}

$('#import-file').addEventListener('change', e => {

  reader.onload = () => {

      if (!d.board || !Array.isArray(d.board.columns)) throw new Error('格式不对');

      data = d;

      data.plans = data.plans || {}; data.goals = data.goals || [];
      save(); applyTheme(); rerender();

});

/* ================= 拖拽（笔记板） ================= */
let dragInfo = null;
document.addEventListener('dragstart', e => {
  const card = e.target.closest('.kcard'); if (!card) return;
  dragInfo = { cardId: card.dataset.card, fromCol: card.dataset.col };
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});
document.addEventListener('dragend', e => {
  document.querySelectorAll('.kcard.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.kcol.drag-over').forEach(c => c.classList.remove('drag-over'));
  dragInfo = null;
});
document.addEventListener('dragover', e => {
  const col = e.target.closest('.kcol');
  if (col && dragInfo) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; col.classList.add('drag-over'); }
});
document.addEventListener('dragleave', e => {
  const col = e.target.closest('.kcol');
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
});
document.addEventListener('drop', e => {
  const colEl = e.target.closest('.kcol');
  if (!colEl || !dragInfo) return;
  e.preventDefault();
  const from = data.board.columns.find(c => c.id === dragInfo.fromCol);
  const to = data.board.columns.find(c => c.id === colEl.dataset.col);
  if (!from || !to) return;
  const idx = from.cards.findIndex(c => c.id === dragInfo.cardId);
  if (idx < 0) return;
  const [card] = from.cards.splice(idx, 1);
  to.cards.push(card);
  save(); renderBoard();
});

/* ================= 账号云同步（Cloudflare D1） ================= */
/* 登录后整份数据自动上传/下载，多端按 updatedAt 新者胜。仅在线版可用。 */
const cloudAvailable = /^https?:$/.test(location.protocol);
let cloud = {
  token: localStorage.getItem('shousuo-cloud-token') || '',
  user: localStorage.getItem('shousuo-cloud-user') || '',
};
let cloudStatus = 'off';     // off | on | error
let lastCloudAt = 0;
let pushTimer = null;

async function api(path, opts = {}) {
  const r = await fetch('/api/' + path, {
    method: opts.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      ...(cloud.token ? { Authorization: 'Bearer ' + cloud.token } : {}),
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw Object.assign(new Error(j.error || ('HTTP ' + r.status)), { status: r.status, payload: j });
  return j;
}

function renderCloudUI() {
  const txt = cloud.token
    ? cloud.user + (cloudStatus === 'error' ? '（同步出错）' : '')
    : '登录 / 注册';
  const a = $('#acct-label'); if (a) a.textContent = txt;
  const m = $('#acct-label-m'); if (m) m.textContent = txt;
}
function clearCloudSession() {
  cloud = { token: '', user: '' };
  localStorage.removeItem('shousuo-cloud-token');
  localStorage.removeItem('shousuo-cloud-user');
  cloudStatus = 'off'; lastCloudAt = 0;
}
function adoptRemote(remote) {
  data = remote;
  data.tasks = data.tasks || {}; data.habits = data.habits || [];
  data.plans = data.plans || {}; data.goals = data.goals || [];
  persistLocal(); applyTheme(); rerender();
}

function scheduleCloudPush() {
  if (!cloud.token || !cloudAvailable) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(cloudPush, 1500);
}
async function cloudPush() {
  clearTimeout(pushTimer); pushTimer = null;
  if (!cloud.token || !cloudAvailable) return;
  try {
    const r = await api('data', { method: 'PUT', body: { data, updatedAt: data.updatedAt } });
    if (r.conflict) adoptRemote(r.data);      // 云端更新：采纳云端
    lastCloudAt = Date.now(); cloudStatus = 'on';
  } catch (e) {
    if (e.status === 401) clearCloudSession(); else cloudStatus = 'error';
  }
  renderCloudUI();
}
async function cloudPull(interactive) {
  if (!cloud.token || !cloudAvailable) return;
  try {
    const r = await api('data');
    if (r.data === null) scheduleCloudPush();                       // 云端还空着：上传本机
    else if ((r.updatedAt || 0) > (data.updatedAt || 0)) adoptRemote(r.data);
    else if ((data.updatedAt || 0) > (r.updatedAt || 0)) {
      if (interactive && r.updatedAt &&
          confirm('云端账号里已有另一份数据：\n「确定」= 使用云端数据（覆盖本机）\n「取消」= 用本机数据覆盖云端')) {
        adoptRemote(r.data);
      } else scheduleCloudPush();
    }
    lastCloudAt = Date.now(); cloudStatus = 'on';
  } catch (e) {
    if (e.status === 401) clearCloudSession(); else cloudStatus = 'error';
  }
  renderCloudUI();
}

function acctModalHTML() {
  if (!cloudAvailable) return `
    <p class="sync-p">账号云同步需要在在线版里使用：</p>
    <p class="sync-p"><b>https://ibook.pages.dev</b></p>
    <p class="sync-note">本地版可以用「导出 / 导入」手动备份、迁移数据。</p>`;
  if (cloud.token) return `
    <div class="sync-kv">
      <span>当前账号：<b>${esc(cloud.user)}</b></span>
      <span>同步状态：<b>${cloudStatus === 'error' ? '⚠️ 出错（可能断网了）' : '✅ 自动同步中'}</b></span>
      ${lastCloudAt ? `<span>最后同步：<b>${new Date(lastCloudAt).toLocaleString('zh-CN')}</b></span>` : ''}
    </div>
    <div class="sync-actions">
      <button class="btn primary" data-action="acct-sync-now">立即同步</button>
      <button class="btn" data-action="acct-new-code">生成新恢复码</button>
      <button class="btn" data-action="acct-logout">退出登录</button>
    </div>
    <p class="sync-note">改动约 1.5 秒后自动上传；其它设备用同一账号登录即可看到相同数据。恢复码用于忘记密码时自助重设，请妥善保存。</p>`;
  return `
    <p class="sync-p">注册一个账号，登录后数据自动云端同步，iPhone / iPad / Mac 实时互通，免费。</p>
    <div class="field"><label>用户名</label><input id="acct-user" type="text" placeholder="2-32 个字符" autocomplete="username"></div>
    <div class="field"><label>密码</label><input id="acct-pass" type="password" placeholder="至少 6 位" autocomplete="current-password" data-enter="acct-login"></div>
    <p class="acct-err" id="acct-err"></p>
    <div class="sync-actions">
      <button class="btn primary" data-action="acct-login">登 录</button>
      <button class="btn" data-action="acct-register">注册新账号</button>
      <button class="linklike" data-action="acct-forgot">忘记密码？用恢复码重设</button>
    </div>
    <p class="sync-note">密码加密存储，服务器只保存加密结果。注册成功会发一个「恢复码」，忘记密码时凭它重设。</p>`;
}

function forgotModalHTML() {
  return `
    <p class="sync-p">输入注册时保存的恢复码，重设密码并直接登录：</p>
    <div class="field"><label>用户名</label><input id="fg-user" type="text" autocomplete="username"></div>
    <div class="field"><label>恢复码</label><input id="fg-code" type="text" class="code-input" placeholder="XXXX-XXXX-XXXX-XXXX"></div>
    <div class="field"><label>新密码</label><input id="fg-pass" type="password" placeholder="至少 6 位" autocomplete="new-password"></div>
    <p class="acct-err" id="fg-err"></p>
    <div class="sync-actions">
      <button class="btn primary" data-action="acct-reset">重设密码并登录</button>
      <button class="linklike" data-action="acct-open">← 返回登录</button>
    </div>
    <p class="sync-note">重设成功后旧恢复码作废，会发一个新恢复码，届时请重新保存。</p>`;
}

function showRecoveryCode(code, intro) {
  openModal({
    title: '你的恢复码',
    hideOk: true,
    html: `
      <p class="sync-p">${intro}</p>
      <div class="field"><input class="code-input" id="rc-input" type="text" readonly value="${esc(code)}"></div>
      <div class="sync-actions">
        <button class="btn primary" data-action="acct-copy-code">复制恢复码</button>
        <button class="btn" data-action="modal-cancel">我已保存好了</button>
      </div>
      <p class="sync-note">⚠️ 恢复码是忘记密码后<b>唯一</b>的找回方式，只显示这一次，请截图或抄写保存。生成新码或用它重设过密码后，旧码即作废。</p>`,
  });
}

async function doAuth(kind) {
  const u = $('#acct-user').value.trim();
  const p = $('#acct-pass').value;
  const err = $('#acct-err');
  if (u.length < 2 || p.length < 6) { err.textContent = '用户名至少 2 个字符，密码至少 6 位'; return; }
  err.textContent = '请稍候…';
  try {
    const r = await api(kind, { method: 'POST', body: { username: u, password: p } });
    cloud.token = r.token; cloud.user = r.username;
    localStorage.setItem('shousuo-cloud-token', cloud.token);
    localStorage.setItem('shousuo-cloud-user', cloud.user);
    closeModal();
    if (r.recoveryCode) showRecoveryCode(r.recoveryCode, `注册成功，账号「${esc(r.username)}」已登录。请先保存好你的恢复码：`);
    await cloudPull(true);
    renderCloudUI();
  } catch (e) {
    err.textContent = e.status === 404
      ? '此网址不含云服务，请使用 ibook.pages.dev'
      : (e.payload && e.payload.error) || '网络错误，稍后再试';
  }
}

Object.assign(actions, {
  'acct-open'() { openModal({ title: '账号与云同步', html: acctModalHTML(), hideOk: true }); },
  'acct-login'() { doAuth('login'); },
  'acct-register'() { doAuth('register'); },
  'acct-forgot'() { openModal({ title: '找回密码', html: forgotModalHTML(), hideOk: true }); },
  async 'acct-reset'() {
    const u = $('#fg-user').value.trim(), c = $('#fg-code').value.trim(), p = $('#fg-pass').value;
    const err = $('#fg-err');
    if (u.length < 2 || !c || p.length < 6) { err.textContent = '请填完整：用户名、恢复码、新密码（至少 6 位）'; return; }
    err.textContent = '请稍候…';
    try {
      const r = await api('recovery/reset', { method: 'POST', body: { username: u, code: c, newPassword: p } });
      cloud.token = r.token; cloud.user = r.username;
      localStorage.setItem('shousuo-cloud-token', cloud.token);
      localStorage.setItem('shousuo-cloud-user', cloud.user);
      closeModal();
      showRecoveryCode(r.recoveryCode, `密码已重设，账号「${esc(r.username)}」已登录。这是你的新恢复码：`);
      await cloudPull(true);
      renderCloudUI();
    } catch (e) {
      err.textContent = (e.payload && e.payload.error) || '网络错误，稍后再试';
    }
  },
  async 'acct-new-code'() {
    if (!confirm('生成新恢复码后，旧恢复码立即作废，确定？')) return;
    try {
      const r = await api('recovery/new', { method: 'POST' });
      closeModal();
      showRecoveryCode(r.recoveryCode, '这是你的新恢复码（旧码已作废）：');
    } catch (e) { alert((e.payload && e.payload.error) || '网络错误，稍后再试'); }
  },
  async 'acct-copy-code'() {
    const inp = $('#rc-input'); inp.select();
    try { await navigator.clipboard.writeText(inp.value); alert('已复制 ✅'); }
    catch (e) {
      try { document.execCommand('copy'); alert('已复制 ✅'); }
      catch (e2) { alert('复制失败，请长按或手动选中复制'); }
    }
  },
  async 'acct-sync-now'() { closeModal(); await cloudPull(); if (cloudStatus === 'on') await cloudPush(); },
  async 'acct-logout'() {
    if (!confirm('退出登录？本机数据保留，云端数据也还在，重新登录即可继续同步。')) return;
    try { await api('logout', { method: 'POST' }); } catch (e) {}
    clearCloudSession(); closeModal(); renderCloudUI();
  },
});

document.addEventListener('visibilitychange', () => {
  if (!cloud.token || !cloudAvailable) return;
  if (document.visibilityState === 'visible') cloudPull();
  else if (pushTimer) cloudPush();
});
setInterval(() => {
  if (cloud.token && cloudAvailable && document.visibilityState === 'visible' && !pushTimer) cloudPull();
}, 120000);

/* ================= 主题 & 启动 ================= */
const ICON_SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg>';
const ICON_MOON = '<svg viewBox="0 0 24 24"><path d="M20.5 14.2A8.7 8.7 0 1 1 9.8 3.5a7 7 0 0 0 10.7 10.7z"/></svg>';
function effectiveTheme() {
  if (data.theme === 'dark' || data.theme === 'light') return data.theme;
  const t = document.documentElement.dataset.theme;   // 宿主环境（如网页版查看器）盖的章
  if (t === 'dark' || t === 'light') return t;
  return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme() {
  if (data.theme === 'dark' || data.theme === 'light')
    document.documentElement.dataset.theme = data.theme;
  const dark = effectiveTheme() === 'dark';
  const svg = dark ? ICON_SUN : ICON_MOON;
  const a = $('#theme-ico'); if (a) a.innerHTML = svg;
  const b = $('#theme-ico-m'); if (b) b.innerHTML = svg;
  const sub = $('#theme-sub-m');
  if (sub) sub.textContent = data.theme === 'dark' ? '深色' : data.theme === 'light' ? '浅色' : '跟随系统';
}
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
applyTheme();
rerender();
renderCloudUI();
if (cloudAvailable && cloud.token) cloudPull();
</script>
</body>
</html>
